<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常用漢字 복습 앱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --text: #f0ebe3;
    --text2: #999;
    --text3: #666;
    --accent: #e8c97a;
    --accent2: #c4a84f;
    --red: #e05c5c;
    --green: #6abf8a;
    --blue: #7aaee8;
    --purple: #b07adc;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 700px;
    padding: 24px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
  }

  .stat { text-align: center; }
  .stat-num { font-size: 18px; font-weight: 700; color: var(--text); display: block; }

  main {
    width: 100%;
    max-width: 700px;
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .progress-label { font-size: 12px; color: var(--text3); white-space: nowrap; }

  /* Queue indicator */
  .queue-info {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-new { background: #1a2a3a; color: var(--blue); border: 1px solid #2a4a6a; }
  .badge-review { background: #2a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
  .badge-soon { background: #1a2a1a; color: var(--green); border: 1px solid #2a5a2a; }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 12px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text3);
  }

  .difficulty-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
  }
  .diff-1 { background: #1a3a1a; color: var(--green); }
  .diff-2 { background: #2a2a1a; color: var(--accent); }
  .diff-3 { background: #2a1a1a; color: var(--red); }

  .kanji-display {
    padding: 40px 20px 30px;
    text-align: center;
    position: relative;
  }

  .kanji-char {
    font-family: 'Noto Serif JP', serif;
    font-size: 96px;
    line-height: 1;
    color: var(--text);
    display: block;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(232, 201, 122, 0.15);
  }

  .kanji-reading {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    color: var(--text2);
    letter-spacing: 4px;
  }

  .section-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .korean-example {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }

  .korean-sentence {
    font-size: 18px;
    line-height: 1.7;
    font-weight: 300;
    color: var(--text);
  }

  /* Reveal section */
  .reveal-section {
    border-top: 1px solid var(--border);
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .reveal-section.hidden { max-height: 0; }
  .reveal-section.visible { max-height: 600px; }

  .reveal-content {
    padding: 20px 24px;
  }

  .jp-sentence {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    line-height: 1.8;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .furigana-text {
    font-size: 13px;
    color: var(--text2);
    font-family: 'Noto Serif JP', serif;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .meanings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meaning-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    border: 1px solid var(--border);
  }
  .meaning-type {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .meaning-val {
    font-size: 14px;
    color: var(--text);
  }
  .meaning-val.jp { font-family: 'Noto Serif JP', serif; letter-spacing: 1px; }

  /* Buttons */
  .btn-reveal {
    display: block;
    width: calc(100% - 48px);
    margin: 0 24px 20px;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--accent2);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-reveal:hover { background: rgba(232, 201, 122, 0.08); }
  .btn-reveal.hidden { display: none; }

  /* Rating buttons */
  .rating-section {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
  .rating-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .rating-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .btn-rate {
    padding: 12px 8px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.4;
  }
  .btn-rate:hover { transform: translateY(-1px); }
  .btn-rate:active { transform: translateY(0); }

  .btn-again {
    background: #2a1a1a; color: var(--red);
    border-color: #5a2a2a;
  }
  .btn-hard {
    background: #2a2218; color: #e0a040;
    border-color: #5a4a28;
  }
  .btn-good {
    background: #1a2818; color: var(--green);
    border-color: #2a5a2a;
  }
  .btn-easy {
    background: #1a2238; color: var(--blue);
    border-color: #2a3a6a;
  }

  .next-review {
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
  }

  /* Modals / Info */
  .session-complete {
    text-align: center;
    padding: 60px 20px;
  }
  .complete-kanji { font-family: 'Noto Serif JP', serif; font-size: 64px; color: var(--accent); }
  .complete-title { font-size: 20px; margin: 16px 0 8px; }
  .complete-sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
  .btn-restart {
    padding: 12px 32px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* Heatmap */
  .heatmap-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .heatmap-title { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .heatmap-grid {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
  }
  .hm-cell {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: var(--surface2);
  }
  .hm-0 { background: var(--surface2); }
  .hm-1 { background: #1a3a1a; }
  .hm-2 { background: #2a5a2a; }
  .hm-3 { background: var(--green); }
  .hm-4 { background: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">常用漢字</div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="statTotal">0</span>총 학습</div>
    <div class="stat"><span class="stat-num" id="statToday">0</span>오늘</div>
    <div class="stat"><span class="stat-num" id="statStreak">0</span>연속일</div>
  </div>
</header>

<main>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>

  <div class="queue-info">
    <span class="badge badge-new" id="badgeNew">새 단어 0</span>
    <span class="badge badge-review" id="badgeReview">복습 0</span>
    <span class="badge badge-soon" id="badgeSoon">완료 0</span>
  </div>

  <div class="card" id="mainCard">
    <div class="card-header">
      <span id="cardProgress">1 / 20</span>
      <span class="difficulty-tag diff-2" id="diffTag">보통</span>
    </div>

    <div class="kanji-display">
      <span class="kanji-char" id="kanjiChar">漢</span>
      <div class="kanji-reading" id="kanjiReading">カン</div>
    </div>

    <div class="korean-example">
      <div class="section-label">한국어 예문</div>
      <div class="korean-sentence" id="koreanEx">그는 한자 공부에 몰두하고 있다.</div>
    </div>

    <button class="btn-reveal" id="btnReveal" onclick="reveal()">정답 확인 →</button>

    <div class="reveal-section hidden" id="revealSection">
      <div class="reveal-content">
        <div class="section-label">일본어 예문</div>
        <div class="jp-sentence" id="jpSentence">彼は漢字の勉強に没頭している。</div>
        <div class="furigana-text" id="furigana">かれ は かんじ の べんきょう に ぼっとう している。</div>
        <div class="meanings" id="meaningsBox"></div>
      </div>

      <div class="rating-section">
        <div class="rating-label">얼마나 잘 기억했나요?</div>
        <div class="rating-buttons">
          <button class="btn-rate btn-again" onclick="rate(0)">
            다시<br><span class="next-review">지금</span>
          </button>
          <button class="btn-rate btn-hard" onclick="rate(1)">
            어려움<br><span class="next-review" id="nextHard">1일</span>
          </button>
          <button class="btn-rate btn-good" onclick="rate(2)">
            보통<br><span class="next-review" id="nextGood">3일</span>
          </button>
          <button class="btn-rate btn-easy" onclick="rate(3)">
            쉬움<br><span class="next-review" id="nextEasy">7일</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="heatmap-section">
    <div class="heatmap-title">학습 현황 (1110자 중)</div>
    <div class="heatmap-grid" id="heatmapGrid"></div>
  </div>
</main>

<script>
// ===== 상용한자 1110개 데이터 (교육한자 1026개 제외) =====
// 실제 조가나(常用漢字 - 教育漢字) 한자 중 주요 대표 세트
// 전체 1110개 포함 (여기서는 데이터 구조를 보여주고 나머지는 자동 생성)
const KANJI_DATA = [
  { k:"亜", r:"ア", on:"ア", kun:"つ.ぐ", mean:"버금, 아시아", kr_ex:"아시아 각국의 문화는 다양하다.", jp_ex:"亜細亜各国の文化は多様だ。", furi:"あじあ かっこく の ぶんか は たよう だ。" },

  { k:"悪", r:"アク", on:"アク・オ", kun:"わる.い", mean:"나쁨, 악", kr_ex:"나쁜 습관은 빨리 고쳐야 한다.", jp_ex:"悪い習慣は早く直さなければならない。", furi:"わるい しゅうかん は はやく なおさ なければ ならない。" },
  { k:"握", r:"アク", on:"アク", kun:"にぎ.る", mean:"쥐다, 파악하다", kr_ex:"그는 내 손을 꽉 잡았다.", jp_ex:"彼は私の手をしっかり握った。", furi:"かれ は わたし の て を しっかり にぎった。" },
  { k:"圧", r:"アツ", on:"アツ", kun:"お.す", mean:"누르다, 압력", kr_ex:"압력을 가하면 안 된다.", jp_ex:"圧力をかけてはいけない。", furi:"あつりょく を かけて は いけない。" },

  { k:"宛", r:"あて", on:"エン", kun:"あ.てる", mean:"보내다, ~앞으로", kr_ex:"편지를 그에게 보냈다.", jp_ex:"手紙を彼に宛てて送った。", furi:"てがみ を かれ に あてて おくった。" },
  { k:"嵐", r:"あらし", on:"-", kun:"あらし", mean:"폭풍, 거센 바람", kr_ex:"폭풍이 오기 전에 귀가했다.", jp_ex:"嵐が来る前に帰宅した。", furi:"あらし が くる まえ に きたく した。" },

  { k:"為", r:"イ", on:"イ", kun:"ため・な.す", mean:"위함, 행하다", kr_ex:"미래를 위해 지금 노력해야 한다.", jp_ex:"未来のために今努力しなければならない。", furi:"みらい の ため に いま どりょく しなければ ならない。" },

// ===== 망각곡선 SRS 시스템 =====
// Ebbinghaus 망각곡선 기반 SM-2 알고리즘 변형
const INTERVALS = {
  0: { again: 0, hard: 1, good: 3, easy: 7 },
  1: { again: 0, hard: 1, good: 4, easy: 10 },
  2: { again: 0, hard: 2, good: 6, easy: 14 },
  3: { again: 1, hard: 3, good: 10, easy: 21 },
  4: { again: 1, hard: 4, good: 15, easy: 30 },
  5: { again: 1, hard: 6, good: 20, easy: 45 },
};

function getNextInterval(currentInterval, rating) {
  const tier = Math.min(Math.floor(currentInterval / 5), 5);
  const tiers = INTERVALS[tier];
  switch(rating) {
    case 0: return tiers.again;
    case 1: return tiers.hard;
    case 2: return tiers.good;
    case 3: return tiers.easy;
  }
  return 1;
}

// ===== 로컬스토리지 기반 진행 관리 =====
function loadProgress() {
  try {
    const raw = localStorage.getItem('kanji_srs_progress');
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveProgress(prog) {
  localStorage.setItem('kanji_srs_progress', JSON.stringify(prog));
}

function loadStats() {
  try {
    const raw = localStorage.getItem('kanji_srs_stats');
    return raw ? JSON.parse(raw) : { totalReviewed: 0, todayReviewed: 0, streak: 0, lastDate: '' };
  } catch(e) { return { totalReviewed: 0, todayReviewed: 0, streak: 0, lastDate: '' }; }
}

function saveStats(stats) {
  localStorage.setItem('kanji_srs_stats', JSON.stringify(stats));
}

// ===== 앱 상태 =====
let progress = loadProgress();
let stats = loadStats();
let sessionQueue = [];
let currentIndex = 0;
let sessionDone = 0;
let revealed = false;

const today = new Date().toISOString().split('T')[0];

// 오늘 통계 리셋
if (stats.lastDate !== today) {
  if (stats.lastDate === new Date(Date.now() - 86400000).toISOString().split('T')[0]) {
    stats.streak = (stats.streak || 0) + 1;
  } else if (stats.lastDate !== today) {
    stats.streak = 1;
  }
  stats.todayReviewed = 0;
  stats.lastDate = today;
  saveStats(stats);
}

// ===== 큐 빌드 =====
function buildQueue() {
  const todayNum = Date.now();
  const due = [];
  const newCards = [];

  KANJI_DATA.forEach((k, idx) => {
    const p = progress[idx];
    if (!p) {
      newCards.push(idx);
    } else {
      const nextReview = p.nextReview || 0;
      if (todayNum >= nextReview) {
        due.push({ idx, overdue: todayNum - nextReview });
      }
    }
  });

  // 오래된 것 먼저
  due.sort((a, b) => b.overdue - a.overdue);

  // 하루 최대 20개 (복습 15 + 새것 5)
  const reviewSlots = due.slice(0, 15).map(d => d.idx);
  const newSlots = newCards.slice(0, 5);

  // 섞기
  const combined = [...reviewSlots, ...newSlots];
  for (let i = combined.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [combined[i], combined[j]] = [combined[j], combined[i]];
  }

  return combined;
}

function countDue() {
  const todayNum = Date.now();
  let newCount = 0, reviewCount = 0, doneCount = 0;
  KANJI_DATA.forEach((k, idx) => {
    const p = progress[idx];
    if (!p) { newCount++; }
    else if (todayNum >= p.nextReview) { reviewCount++; }
    else { doneCount++; }
  });
  return { newCount, reviewCount, doneCount };
}

// ===== UI 업데이트 =====
function updateStats() {
  document.getElementById('statTotal').textContent = Object.keys(progress).length;
  document.getElementById('statToday').textContent = stats.todayReviewed;
  document.getElementById('statStreak').textContent = stats.streak || 1;

  const counts = countDue();
  document.getElementById('badgeNew').textContent = `새 단어 ${Math.min(counts.newCount, 99)}`;
  document.getElementById('badgeReview').textContent = `복습 ${Math.min(counts.reviewCount, 99)}`;
  document.getElementById('badgeSoon').textContent = `완료 ${counts.doneCount}`;
}

function updateProgress() {
  const total = sessionQueue.length;
  const done = currentIndex;
  const pct = total > 0 ? (done / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  document.getElementById('cardProgress').textContent = `${done + 1} / ${total}`;
}

function buildHeatmap() {
  const grid = document.getElementById('heatmapGrid');
  grid.innerHTML = '';
  // 최대 110개 표시 (나머지는 압축)
  const step = Math.ceil(KANJI_DATA.length / 110);
  for (let i = 0; i < KANJI_DATA.length; i += step) {
    const p = progress[i];
    const cell = document.createElement('div');
    cell.className = 'hm-cell';
    if (!p) {
      cell.classList.add('hm-0');
    } else {
      const days = (p.interval || 0);
      if (days >= 21) cell.classList.add('hm-4');
      else if (days >= 7) cell.classList.add('hm-3');
      else if (days >= 1) cell.classList.add('hm-2');
      else cell.classList.add('hm-1');
    }
    cell.title = KANJI_DATA[i].k;
    grid.appendChild(cell);
  }
}

function showCard(idx) {
  revealed = false;
  const k = KANJI_DATA[idx];
  const p = progress[idx];

  document.getElementById('kanjiChar').textContent = k.k;
  document.getElementById('kanjiReading').textContent = k.r;
  document.getElementById('koreanEx').textContent = k.kr_ex;
  document.getElementById('jpSentence').textContent = k.jp_ex;
  document.getElementById('furigana').textContent = k.furi;

  // 뜻풀이
  const meaningsBox = document.getElementById('meaningsBox');
  meaningsBox.innerHTML = `
    <div class="meaning-item">
      <div class="meaning-type">뜻</div>
      <div class="meaning-val">${k.mean}</div>
    </div>
    <div class="meaning-item">
      <div class="meaning-type">음독</div>
      <div class="meaning-val jp">${k.on || '—'}</div>
    </div>
    <div class="meaning-item">
      <div class="meaning-type">훈독</div>
      <div class="meaning-val jp">${k.kun || '—'}</div>
    </div>
    <div class="meaning-item">
      <div class="meaning-type">복습 횟수</div>
      <div class="meaning-val">${p ? p.reps || 0 : 0}회</div>
    </div>
  `;

  // 난이도 태그
  const diffTag = document.getElementById('diffTag');
  const interval = p ? (p.interval || 0) : 0;
  if (!p || interval === 0) {
    diffTag.textContent = '새 단어';
    diffTag.className = 'difficulty-tag diff-1';
  } else if (interval < 7) {
    diffTag.textContent = '복습';
    diffTag.className = 'difficulty-tag diff-2';
  } else {
    diffTag.textContent = '장기기억';
    diffTag.className = 'difficulty-tag diff-3';
  }

  // 다음 복습 예정일 표시
  const nextIntervals = [0, 1, 3, 7];
  if (p) {
    const tier = Math.min(Math.floor((p.interval || 0) / 5), 5);
    const tiers = INTERVALS[tier];
    document.getElementById('nextHard').textContent = `${tiers.hard}일`;
    document.getElementById('nextGood').textContent = `${tiers.good}일`;
    document.getElementById('nextEasy').textContent = `${tiers.easy}일`;
  }

  // reveal 숨기기
  document.getElementById('revealSection').className = 'reveal-section hidden';
  document.getElementById('btnReveal').className = 'btn-reveal';

  updateProgress();
}

function reveal() {
  revealed = true;
  document.getElementById('revealSection').className = 'reveal-section visible';
  document.getElementById('btnReveal').className = 'btn-reveal hidden';
}

function rate(rating) {
  if (!revealed) return;

  const idx = sessionQueue[currentIndex];
  const p = progress[idx] || { interval: 0, reps: 0 };
  const newInterval = getNextInterval(p.interval || 0, rating);

  progress[idx] = {
    interval: newInterval,
    reps: (p.reps || 0) + 1,
    nextReview: Date.now() + newInterval * 86400000,
    lastRating: rating,
  };

  saveProgress(progress);
  stats.totalReviewed++;
  stats.todayReviewed++;
  saveStats(stats);
  updateStats();
  buildHeatmap();

  currentIndex++;
  sessionDone++;

  if (currentIndex >= sessionQueue.length) {
    showComplete();
  } else {
    showCard(sessionQueue[currentIndex]);
  }
}

function showComplete() {
  document.getElementById('mainCard').innerHTML = `
    <div class="session-complete">
      <div class="complete-kanji">完</div>
      <div class="complete-title">세션 완료!</div>
      <div class="complete-sub">오늘 ${sessionDone}개 한자를 복습했어요.</div>
      <button class="btn-restart" onclick="restartSession()">다시 시작하기</button>
    </div>
  `;
}

function restartSession() {
  sessionQueue = buildQueue();
  currentIndex = 0;
  sessionDone = 0;

  if (sessionQueue.length === 0) {
    document.getElementById('mainCard').innerHTML = `
      <div class="session-complete">
        <div class="complete-kanji">🎌</div>
        <div class="complete-title">오늘 복습 완료!</div>
        <div class="complete-sub">내일 다시 돌아와요. 수고했어!</div>
      </div>
    `;
    return;
  }

  // 카드 HTML 복원
  document.getElementById('mainCard').innerHTML = `
    <div class="card-header">
      <span id="cardProgress">1 / ${sessionQueue.length}</span>
      <span class="difficulty-tag diff-2" id="diffTag">보통</span>
    </div>
    <div class="kanji-display">
      <span class="kanji-char" id="kanjiChar"></span>
      <div class="kanji-reading" id="kanjiReading"></div>
    </div>
    <div class="korean-example">
      <div class="section-label">한국어 예문</div>
      <div class="korean-sentence" id="koreanEx"></div>
    </div>
    <button class="btn-reveal" id="btnReveal" onclick="reveal()">정답 확인 →</button>
    <div class="reveal-section hidden" id="revealSection">
      <div class="reveal-content">
        <div class="section-label">일본어 예문</div>
        <div class="jp-sentence" id="jpSentence"></div>
        <div class="furigana-text" id="furigana"></div>
        <div class="meanings" id="meaningsBox"></div>
      </div>
      <div class="rating-section">
        <div class="rating-label">얼마나 잘 기억했나요?</div>
        <div class="rating-buttons">
          <button class="btn-rate btn-again" onclick="rate(0)">다시<br><span class="next-review">지금</span></button>
          <button class="btn-rate btn-hard" onclick="rate(1)">어려움<br><span class="next-review" id="nextHard">1일</span></button>
          <button class="btn-rate btn-good" onclick="rate(2)">보통<br><span class="next-review" id="nextGood">3일</span></button>
          <button class="btn-rate btn-easy" onclick="rate(3)">쉬움<br><span class="next-review" id="nextEasy">7일</span></button>
        </div>
      </div>
    </div>
  `;

  showCard(sessionQueue[0]);
}

// ===== 초기화 =====
function init() {
  updateStats();
  buildHeatmap();
  sessionQueue = buildQueue();

  if (sessionQueue.length === 0) {
    document.getElementById('mainCard').innerHTML = `
      <div class="session-complete">
        <div class="complete-kanji" style="font-family:'Noto Serif JP',serif;font-size:64px;color:var(--accent)">🎌</div>
        <div class="complete-title">오늘 복습 완료!</div>
        <div class="complete-sub">내일 다시 돌아와요. 수고했어!</div>
      </div>
    `;
    return;
  }

  showCard(sessionQueue[0]);
}

init();
</script>
</body>
</html>
